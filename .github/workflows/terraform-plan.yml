# =============================================================================
# TERRAFORM PLAN — Runs on Every Pull Request
# =============================================================================
# WHAT THIS DOES:
#   When someone opens or updates a Pull Request, this workflow:
#   1. Checks out the code
#   2. Authenticates to AWS (using OIDC — no stored keys!)
#   3. Runs "terraform plan" to show what WILL change
#   4. Posts the plan as a comment on the PR
#
# WHY THIS IS VALUABLE:
#   Everyone reviewing the PR can see exactly what AWS changes will happen
#   before anyone approves or merges. No surprises.
#
# WHAT IS OIDC?
#   OpenID Connect lets GitHub prove its identity to AWS without storing
#   long-lived access keys in GitHub Secrets. It works like a handshake:
#   GitHub says "I am workflow X in repo Y" and AWS trusts this because
#   you configured the trust relationship in the IAM role.
# =============================================================================

name: "Terraform Plan"

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - "environments/windows-workstation/**"
      - "modules/**"
      - ".github/workflows/terraform-*.yml"

permissions:
  id-token: write    # Required for OIDC authentication
  contents: read     # Required to check out the code
  pull-requests: write  # Required to post comments on the PR

env:
  TF_VERSION: "1.9.0"
  WORKING_DIR: "environments/windows-workstation"
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      # -----------------------------------------------------------------------
      # STEP 1: Get the code
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # STEP 2: Install Terraform
      # -----------------------------------------------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true  # Allows capturing terraform output

      # -----------------------------------------------------------------------
      # STEP 3: Authenticate to AWS using OIDC (no access keys stored!)
      # -----------------------------------------------------------------------
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-plan-${{ github.run_id }}

      # -----------------------------------------------------------------------
      # STEP 4: Verify AWS identity (useful for debugging)
      # -----------------------------------------------------------------------
      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # -----------------------------------------------------------------------
      # STEP 5: Set up backend config using GitHub Secrets
      # -----------------------------------------------------------------------
      - name: Write backend config
        run: |
          cat > backend_override.tf << EOF
          terraform {
            backend "s3" {
              bucket         = "${{ secrets.TF_STATE_BUCKET }}"
              key            = "windows-workstation/terraform.tfstate"
              region         = "${{ secrets.AWS_REGION }}"
              dynamodb_table = "${{ secrets.TF_STATE_LOCK_TABLE }}"
              encrypt        = true
            }
          }
          EOF

      # -----------------------------------------------------------------------
      # STEP 6: Write the tfvars from secrets
      # -----------------------------------------------------------------------
      - name: Write terraform.tfvars
        run: |
          cat > terraform.tfvars << EOF
          aws_account_id         = "${{ secrets.AWS_ACCOUNT_ID }}"
          aws_region             = "${{ secrets.AWS_REGION }}"
          project_name           = "${{ secrets.PROJECT_NAME }}"
          environment            = "${{ secrets.ENVIRONMENT }}"
          availability_zones     = ${{ secrets.AVAILABILITY_ZONES }}
          alert_email            = "${{ secrets.ALERT_EMAIL }}"
          instance_type          = "${{ secrets.INSTANCE_TYPE }}"
          EOF

      # -----------------------------------------------------------------------
      # STEP 7: Download providers and modules
      # -----------------------------------------------------------------------
      - name: Terraform Init
        id: init
        run: terraform init
        env:
          TF_INPUT: false

      # -----------------------------------------------------------------------
      # STEP 8: Check formatting (catches typos and style issues)
      # -----------------------------------------------------------------------
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive ../../
        continue-on-error: true  # Don't fail the build, just warn

      # -----------------------------------------------------------------------
      # STEP 9: Validate configuration syntax
      # -----------------------------------------------------------------------
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # -----------------------------------------------------------------------
      # STEP 10: Generate the plan
      # -----------------------------------------------------------------------
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -no-color \
            -out=tfplan \
            2>&1 | tee plan_output.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true  # Don't fail yet — we post the output first
        env:
          TF_INPUT: false

      # -----------------------------------------------------------------------
      # STEP 11: Post plan as a PR comment
      # -----------------------------------------------------------------------
      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');

            const fmtOutcome = '${{ steps.fmt.outcome }}';
            const validateOutcome = '${{ steps.validate.outcome }}';
            const planOutcome = '${{ steps.plan.outcome }}';

            const truncatedPlan = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n... (truncated — see Actions log for full output)'
              : planOutput;

            const body = `## Terraform Plan Results 🔍

            | Step | Result |
            |------|--------|
            | Format Check | ${ fmtOutcome === 'success' ? '✅ Pass' : '⚠️ Warnings (non-blocking)' } |
            | Validate | ${ validateOutcome === 'success' ? '✅ Pass' : '❌ Failed' } |
            | Plan | ${ planOutcome === 'success' ? '✅ Success' : '❌ Failed' } |

            <details>
            <summary>📋 Click to expand Terraform Plan</summary>

            \`\`\`hcl
            ${truncatedPlan}
            \`\`\`
            </details>

            > **Review the plan above before merging.** Merging this PR will trigger \`terraform apply\`.
            > *Workflow: \`${{ github.workflow }}\` | Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;

            // Delete previous plan comments (keep PR clean)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const comment of comments) {
              if (comment.user.type === 'Bot' && comment.body.includes('Terraform Plan Results')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # -----------------------------------------------------------------------
      # STEP 12: Fail if plan failed
      # -----------------------------------------------------------------------
      - name: Check plan result
        if: steps.plan.outcome == 'failure'
        run: exit 1
